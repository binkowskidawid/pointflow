name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe the problem you are solving.

  - type: dropdown
    id: stage
    attributes:
      label: Roadmap stage
      description: Which stage of the roadmap does this fit?
      options:
        - "Stage 1 — Foundation"
        - "Stage 2 — Microservices & Kafka"
        - "Stage 3 — Analytics & Release"
        - "Stage 4 — Community Features"
        - "Not on the roadmap"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? Be specific.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe your preferred solution. Code examples are welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider and why did you reject them?

  - type: checkboxes
    id: willingness
    attributes:
      label: Are you willing to implement this?
      options:
        - label: Yes, I would like to open a PR for this feature
