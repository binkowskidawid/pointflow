services:
  cockroachdb:
    image: cockroachdb/cockroach:v25.2.13
    container_name: pointflow-db
    command: start-single-node --insecure --advertise-addr=cockroachdb
    ports:
      - "26257:26257" # SQL wire protocol (PostgreSQL compatible)
      - "8080:8080" # CockroachDB Admin UI
    volumes:
      - cockroach-data:/cockroach/cockroach-data
    healthcheck:
      test: ["CMD", "cockroach", "sql", "--insecure", "--execute=SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  db-init:
    image: cockroachdb/cockroach:v25.2.13
    container_name: pointflow-db-init
    depends_on:
      cockroachdb:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        cockroach sql --insecure --host=cockroachdb --execute="
          CREATE DATABASE IF NOT EXISTS pf_loyalty;
          CREATE DATABASE IF NOT EXISTS pf_notifications;
          CREATE DATABASE IF NOT EXISTS pf_auth;
          CREATE USER IF NOT EXISTS pointflow_user;
          GRANT ALL ON DATABASE pf_loyalty TO pointflow_user;
          GRANT ALL ON DATABASE pf_notifications TO pointflow_user;
          GRANT ALL ON DATABASE pf_auth TO pointflow_user;
        "

  kafka:
    image: apache/kafka:4.2.0
    container_name: pointflow-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true" # false in production
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: pointflow-kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: pointflow-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy

  mailhog:
    image: mailhog/mailhog:latest
    container_name: pointflow-mailhog
    platform: linux/amd64
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  cockroach-data:
  kafka_data:
